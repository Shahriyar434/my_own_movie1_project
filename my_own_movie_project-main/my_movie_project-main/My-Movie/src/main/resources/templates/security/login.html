<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Movie System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32; /* Using Green for "Create" actions */
            --bg-color: #f2f0e6;
            --card-bg: #e0ddd2;
            --text-color: #333;
            --error-red: #d32f2f;
        }

        body {
            font-family: 'Funnel Display', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .register-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 20px;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 2rem;
            color: var(--text-color);
        }

        p.subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 10px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 5px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.2);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            margin: 20px 0 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .login-link {
            display: block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Account</h2>
    <p class="subtitle">Join our Movie Management System</p>

    <form th:action="@{/register}" th:object="${userForm}" method="post">

        <div class="form-group">
            <input type="text" th:field="*{username}" placeholder="Username" required autofocus />
            <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
            <input type="email" th:field="*{email}" placeholder="Email Address" required />
            <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <input type="password" th:field="*{password}" placeholder="Password" required />
            <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="form-group">
            <input type="password" th:field="*{confirmPassword}" placeholder="Confirm Password" required />
            <span class="error-msg" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
        </div>

        <button type="submit">Register Now</button>
    </form>

    <a th:href="@{/login}" class="login-link">Already have an account? Sign In</a>
</div>

</body>
</html>
