<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e50914;
            --secondary: #4CAF50;
            --bg: #f2f0e6;
            --text: #333;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg);
            font-family: 'Funnel Display', sans-serif;
            color: var(--text);
            margin: 0;
            padding: 40px;
        }

        h1 { text-align: center; font-size: 2.5rem; }

        /* Language Switcher */
        .lang-switch { text-align: right; margin-bottom: 20px; }
        .lang-switch a {
            text-decoration: none; color: var(--text); font-weight: bold;
            padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px;
        }

        /* Search Bar Area */
        .controls {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
        }

        .search-form {
            background: #e0ddd2;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* Table Styling */
        table {
            width: 100%;
            max-width: 1100px;
            margin: 20px auto;
            border-collapse: collapse;
            background: var(--white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #333;
            color: white;
            padding: 15px;
            text-transform: uppercase;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        tr:hover { background-color: #f9f9f9; }

        /* Buttons */
        .btn, .edit, .delete, .search-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        .btn { background: #666; color: white; }
        .edit { background: var(--secondary); color: white; margin-right: 5px; }
        .delete { background: #ff4d4d; color: white; }
        .search-btn { background: #333; color: white; }

        .btn:hover, .search-btn:hover { background: #000; }
        .edit:hover { background: #006400; }
        .delete:hover { background: #cc0000; }

        /* Pagination */
        .pagination {
            text-align: center;
            margin-top: 30px;
        }
        .pagination a {
            padding: 8px 12px;
            margin: 0 4px;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            border-radius: 4px;
        }
        .pagination a.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        .alert {
            padding: 10px;
            border-radius: 5px;
            max-width: 1000px;
            margin: 0 auto 10px auto;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="lang-switch">
    <a th:href="@{?lang=en}">EN</a>
    <a th:href="@{?lang=ru}">RU</a>
</div>

<h1>Movies</h1>

<div th:if="${success}" class="alert" style="background: #d4edda; color: #155724;" th:text="${success}"></div>
<div th:if="${error}" class="alert" style="background: #f8d7da; color: #721c24;" th:text="${error}"></div>

<div class="controls">
    <form method="get" th:action="@{/movies}" class="search-form">
        <div>
            <label>Title:</label>
            <input type="text" name="title" th:value="${title}" />
        </div>
        <div>
            <label>Genre:</label>
            <input type="text" name="genre" th:value="${genre}" />
        </div>
        <button type="submit" class="search-btn">Search</button>
        <a href="/movies" style="color: #666; font-size: 0.9rem;">Reset</a>
    </form>

    <a th:if="${isAdmin}" href="/movies/new" class="btn">Add New Movie</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>
            <a th:href="@{/movies(sortBy='title', direction=${direction == 'asc' ? 'desc' : 'asc'}, title=${title}, genre=${genre}, page=${currentPage}, size=${size})}"
               style="color: white; text-decoration: none;">
                Title <span th:text="${sortBy == 'title'} ? (${direction == 'asc' ? '▲' : '▼'}) : ''"></span>
            </a>
        </th>
        <th>Genre</th>
        <th>Release Date</th>
        <th>Rating</th>
        <th>Duration</th>
        <th>Director</th>
        <th th:if="${isAdmin}">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="movie : ${movies}">
        <td th:text="${movie.id}"></td>
        <td th:text="${movie.title}" style="font-weight: bold;"></td>
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.releaseDate}"></td>
        <td th:text="${movie.rating}"></td>
        <td th:text="${movie.duration} + ' min'"></td>
        <td th:text="${movie.directorName}"></td>
        <td th:if="${isAdmin}">
            <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="edit" th:text="#{button.edit}">Edit</a>
            <form th:action="@{/movies/delete/{id}(id=${movie.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Are you sure you want to delete this movie?');">
                <button class="delete" type="submit" th:text="#{button.delete}">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div class="pagination">
    <a th:if="${currentPage > 0}" th:href="@{/movies(page=${currentPage - 1}, size=${size}, title=${title}, genre=${genre}, sortBy=${sortBy}, direction=${direction})}">&laquo; Previous</a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/movies(page=${i}, size=${size}, title=${title}, genre=${genre}, sortBy=${sortBy}, direction=${direction})}"
               th:text="${i + 1}"
               th:class="${i == currentPage} ? 'active' : ''"></a>
        </span>

    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/movies(page=${currentPage + 1}, size=${size}, title=${title}, genre=${genre}, sortBy=${sortBy}, direction=${direction})}">Next &raquo;</a>
</div>

</body>
</html>
