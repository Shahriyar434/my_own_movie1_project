<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Movie Management System</title>
    <style>
        :root {
            --primary-red: #e50914;
            --dark-bg: #141414;
            --card-bg: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .error-card {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.3));
        }

        h2 {
            font-size: 2.2rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            background-color: var(--primary-red);
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        .btn-back:hover {
            background-color: #f40612;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.6);
        }

        .btn-back:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="error-card">
    <span class="error-icon">🎬</span>
    <h2>Oops! Something went wrong</h2>
    <p th:text="${message}">The requested movie resource could not be found or an internal error occurred.</p>
    <a href="/movies" class="btn-back">Back to Movies</a>
</div>

</body>
</html>
